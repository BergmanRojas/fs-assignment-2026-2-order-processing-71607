name: .NET Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore FullStackAssignment4-71607.sln

      - name: Build solution
        run: dotnet build FullStackAssignment4-71607.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test FullStackAssignment4-71607.sln --no-build --configuration Release